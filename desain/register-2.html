<!DOCTYPE html>
<html class="light" lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CEEKLIN | Registrasi Mitra - Rekening Bank</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Inter:wght@300;400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#570000",
                        "primary-container": "#800000",
                        "secondary": "#735c00",
                        "surface": "#fef9e9",
                        "surface-container": "#f2eede",
                        "surface-container-low": "#f8f4e4",
                        "surface-container-high": "#ece8d8",
                        "surface-container-highest": "#e6e3d3",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e6e3d3",
                        "on-surface": "#1d1c12",
                        "on-surface-variant": "#5a413d",
                        "on-primary": "#ffffff",
                        "outline": "#8e706c",
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "jakarta": ["Plus Jakarta Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        .hexagon {
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }

        body {
            background-color: #f5f1e1;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }
    </style>
</head>

<body class="font-body text-on-surface min-h-screen flex flex-col">

    <!-- Navbar -->
    <header class="bg-surface sticky top-0 z-50 border-b-2 border-surface-container-high">
        <div class="flex justify-between items-center w-full px-8 py-5 max-w-6xl mx-auto">
            <a href="index.html"
                class="text-2xl font-black text-primary-container tracking-tighter font-headline uppercase hover:opacity-80 transition-opacity">CEEKLIN</a>
            <div class="flex items-center gap-6">
                <a href="index.html"
                    class="hidden md:block text-on-surface-variant font-headline font-bold text-sm uppercase tracking-tight hover:text-primary transition-colors">Home</a>
                <a href="login.html"
                    class="bg-primary-container text-on-primary font-headline font-bold text-sm uppercase tracking-tight px-5 py-2 hover:bg-primary transition-colors">Login</a>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-12 px-4 md:px-8">
        <div class="w-full max-w-3xl">

            <!-- Stepper -->
            <div class="flex items-center justify-center gap-4 mb-10">
                <div class="flex items-center gap-3">
                    <div
                        class="hexagon w-12 h-12 bg-secondary flex items-center justify-center text-on-primary font-jakarta font-extrabold text-lg">
                        <span class="material-symbols-outlined text-xl"
                            style="font-variation-settings: 'FILL' 1;">check</span>
                    </div>
                    <span class="font-jakarta font-bold text-sm text-secondary opacity-60 hidden sm:block">Data
                        Diri</span>
                </div>
                <div class="h-[2px] w-12 bg-secondary"></div>
                <div class="flex items-center gap-3">
                    <div
                        class="hexagon w-12 h-12 bg-primary-container flex items-center justify-center text-on-primary font-jakarta font-extrabold text-lg">
                        2</div>
                    <span class="font-jakarta font-bold text-sm text-primary-container hidden sm:block">Rekening
                        Bank</span>
                </div>
                <div class="h-[2px] w-12 bg-surface-variant"></div>
                <div class="flex items-center gap-3 opacity-35">
                    <div
                        class="hexagon w-12 h-12 bg-surface-variant flex items-center justify-center text-on-surface font-jakarta font-extrabold text-lg">
                        3</div>
                    <span class="font-jakarta font-bold text-sm text-on-surface hidden sm:block">Verifikasi</span>
                </div>
            </div>

            <!-- Form Card -->
            <div
                class="bg-surface-container-lowest border-t-[8px] border-primary-container shadow-[0_30px_60px_-15px_rgba(87,0,0,0.1)]">
                <div class="p-8 md:p-10 border-b border-surface-variant">
                    <h1 class="font-jakarta font-extrabold text-2xl text-primary-container uppercase tracking-tight">
                        Informasi Rekening Bank</h1>
                    <p class="text-on-surface-variant text-sm mt-1">Pastikan data rekening sesuai dengan kartu identitas
                        yang didaftarkan.</p>
                </div>

                <form action="register-3.html" class="p-8 md:p-10 font-jakarta">
                    <div class="space-y-7">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs font-bold uppercase tracking-widest text-primary">Rekening Atas
                                Nama</label>
                            <input
                                class="bg-surface-container border-0 border-b-2 border-primary-container px-4 py-3 focus:ring-0 focus:border-secondary transition-colors font-medium placeholder:text-outline/40 text-sm uppercase"
                                placeholder="Nama lengkap pemilik rekening" type="text" required />
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-7">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-xs font-bold uppercase tracking-widest text-primary">Nama
                                    Bank</label>
                                <input
                                    class="bg-surface-container border-0 border-b-2 border-primary-container px-4 py-3 focus:ring-0 focus:border-secondary transition-colors font-medium placeholder:text-outline/40 text-sm"
                                    placeholder="Contoh: BCA, BNI, BRI" type="text" required />
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-xs font-bold uppercase tracking-widest text-primary">Nomor
                                    Rekening</label>
                                <input
                                    class="bg-surface-container border-0 border-b-2 border-primary-container px-4 py-3 focus:ring-0 focus:border-secondary transition-colors font-medium placeholder:text-outline/40 text-sm"
                                    placeholder="0000000000" type="number" required />
                            </div>
                        </div>
                    </div>

                    <div
                        class="mt-12 flex flex-col sm:flex-row justify-between items-center gap-4 border-t border-surface-variant pt-8">
                        <button
                            class="w-full sm:w-auto px-8 py-4 border-2 border-primary-container text-primary-container font-jakarta font-black uppercase tracking-widest hover:bg-primary-container hover:text-white transition-all active:translate-y-0.5"
                            type="button" onclick="window.location.href='register-1.html'">
                            Kembali
                        </button>
                        <button
                            class="w-full sm:w-auto bg-primary-container text-on-primary px-10 py-4 font-jakarta font-black uppercase tracking-widest flex items-center justify-center gap-3 hover:bg-primary transition-all active:translate-y-0.5 shadow-[0_10px_25px_-5px_rgba(87,0,0,0.25)]"
                            type="submit">
                            Lanjut
                            <span class="material-symbols-outlined text-lg">arrow_forward</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="w-full px-8 py-8 flex justify-between items-center bg-[#1d1c12] border-t-4 border-[#800000] mt-auto">
        <div class="text-[#735c00] font-headline font-bold text-sm tracking-tighter">CEEKLIN INDUSTRIAL</div>
        <div class="text-[#735c00] text-[10px] tracking-widest uppercase">© 2024 CEEKLIN</div>
    </footer>
</body>

</html>
